# Blueprint: https://render.com/docs/blueprint-spec
# После push: Render Dashboard → New → Blueprint → выбрать репозиторий

databases:
  - name: flower-db
    databaseName: flower_aggregator
    user: flower
    plan: free

services:
  - type: web
    name: flower-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: flower-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: flower-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: flower-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: flower-web
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: flower-api
          envVarKey: RENDER_EXTERNAL_URL
